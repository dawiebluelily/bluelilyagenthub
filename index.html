<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#070b16" />
  <title>Blue Lily Agent Hub</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="assets/android-chrome-192x192.png" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <header class="topbar">
      <img class="brand-logo" src="assets/blue-lily-logo.png" alt="Blue Lily Properties" />
      <div class="brand-copy">
        <div class="brand-title">BLUE LILY</div>
        <div class="brand-subtitle">AGENT HUB</div>
      </div>
    </header>

    <section class="search-panel">
      <label for="searchInput">SEARCH TOOLS</label>
      <div class="search-row">
        <input id="searchInput" type="search" placeholder="Search PropCTRL, TVA, CMA, Bond, Photo..." autocomplete="off" />
        <div class="filters" aria-label="Tool filters">
          <button class="filter-btn" data-filter="all">All</button>
          <button class="filter-btn active" data-filter="agent-tools">Agent Tools</button>
          <button class="filter-btn disabled" data-filter="loading" disabled>More Blue Lily Sections Loading</button>
        </div>
      </div>
    </section>

    <section class="section-card">
      <div class="section-top">
        <div>
          <p class="section-number">SECTION 01</p>
          <h1>Agent Tools</h1>
        </div>
        <p id="itemCount" class="item-count">7 ITEMS</p>
      </div>

      <div id="toolGrid" class="tool-grid"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
